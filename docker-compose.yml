# ============================================================
# Pulse — Docker Compose
# Brings up: FastAPI, Next.js, Redis
# ============================================================

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - HELIUS_API_KEY=${HELIUS_API_KEY}
      - HELIUS_WEBHOOK_SECRET=${HELIUS_WEBHOOK_SECRET}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      - UPSTASH_REDIS_TOKEN=${UPSTASH_REDIS_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      - ANCHOR_PROGRAM_ID=${ANCHOR_PROGRAM_ID}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - redis
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - NEXT_PUBLIC_FASTAPI_URL=http://api:8000
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: on-failure

  # Redis (Upstash compatible)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:

